name: ci
on:
    push:
        branches:
            - "*"
        paths:
            - "src/**"
            - "tests/**"
            - "_locales/**"

jobs:
    builds:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: denoland/setup-deno@v2
            - uses: actions/cache@v4
              with:
                path: |
                    ~/.deno
                    ~/.cache/deno
                key: ${{ runner.os }}-deno-${{ hashFiles('**/deno.json') }}
            - run: |
                deno lint
                deno task types
                deno task test
                deno task build
