<!DOCTYPE html>
<html lang="en" dir="auto">
    <head>
        <title>New tab</title>

        <meta charset="utf-8" />
        <meta name="theme-color" content="#000" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
        />

        <!-- default icon -->
        <!-- icon -->
        <!-- manifest -->

    <body class="init loading">
        <dialog id="contextmenu">
            <form id="editlink-form">
                <label id="edit-title" autofocus>
                    <span class="trn">Title</span>
                    <input
                        id="e-title"
                        type="text"
                        name="e-title"
                        maxlength="64"
                        autocomplete="off"
                        placeholder="Example"
                    />
                </label>

                <label id="edit-url">
                    <span class="trn">Link</span>
                    <input
                        id="e-url"
                        type="text"
                        name="e-url"
                        maxlength="512"
                        autocomplete="off"
                        autocorrect="off"
                        autocapitalize="off"
                        placeholder="https://example.com"
                    />
                </label>

                <label id="edit-icon">
                    <span class="trn">Icon</span>
                    <select name="edit-icon" id="e-icon-type">
                        <option value="auto" class="trn">Website favicon</option>
                        <option value="file" class="trn">Local file</option>
                        <option value="url" class="trn">URL</option>
                    </select>
                </label>

                <label id="edit-icon-file">
                    <span class="trn">File</span>
                    <input id="e-icon-file" type="file" name="edit-icon-file" accept="image/*" />
                    <span id="e-icon-file-label" class="trn">No file chosen</span>
                </label>

                <label id="edit-icon-url">
                    <span class="trn">URL</span>
                    <input
                        id="e-icon-url"
                        type="url"
                        name="e-icon-url"
                        maxlength="7600"
                        autocomplete="off"
                        placeholder="https://example.com/favicon.ico"
                    />
                </label>

                <hr />

                <!-- <button type="submit" class="trn" id="edit-inputs">Submit from inputs</button> -->

                <button type="submit" id="edit-apply">

                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"

                <button type="submit" class="trn" id="edit-synced">Synced links cannot be modified</button>
